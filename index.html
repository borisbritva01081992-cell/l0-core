<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #05000a; color: #bc13fe; font-family: monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .core-box { position: relative; width: 250px; height: 250px; display: flex; justify-content: center; align-items: center; }
        .energy-core { width: 160px; height: 160px; border-radius: 50%; border: 2px solid #bc13fe; box-shadow: 0 0 30px #bc13fe; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: p 3s infinite; z-index: 5; background: radial-gradient(circle, #2a004f 0%, #05000a 80%); }
        .wave { position: absolute; border: 1px solid #00d4ff; border-radius: 50%; width: 160px; height: 160px; opacity: 0; animation: e 3s linear infinite; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes e { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(2.2); opacity: 0; } }
        .btn-scan { margin-top: 40px; border: 1px solid #00d4ff; color: #00d4ff; padding: 15px 40px; border-radius: 10px; background: rgba(0, 212, 255, 0.1); cursor: pointer; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; color: #00d4ff; font-size: 10px;">L0_CORE_ACTIVE</div>
    <div class="core-box">
        <div class="wave" style="animation-delay: 0s"></div>
        <div class="wave" style="animation-delay: 1.5s"></div>
        <div class="energy-core">
            <div style="font-size: 8px;">SYNDICATE</div>
            <div style="font-size: 32px; color: #fff; font-weight: bold;" id="val">115.4</div>
            <div style="font-size: 8px;">TH/S</div>
        </div>
    </div>
    <div class="btn-scan" onclick="scan()">SYNC SYSTEM</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        function scan() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            alert("System Synced!");
        }
        setInterval(() => { document.getElementById('val').innerText = (115.4 + (Math.random()*0.4-0.2)).toFixed(1); }, 2000);
    </script>
</body>
</html>
