<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .core { width: 200px; height: 200px; border: 2px solid #00ff00; border-radius: 50%; box-shadow: 0 0 50px #00ff00; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: b 3s infinite; }
        .val { font-size: 40px; color: #fff; text-shadow: 0 0 10px #00ff00; }
        @keyframes b { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        .btn { margin-top: 40px; border: 1px solid #00ff00; color: #00ff00; background: none; padding: 10px 30px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="up" style="position:absolute; top:20px; font-size:10px;">UP: 00:00:00</div>
    <div class="core">
        <div style="font-size:12px;">POWER</div>
        <div id="h" class="val">115.4</div>
        <div style="font-size:10px;">TH/S</div>
    </div>
    <button class="btn" onclick="window.Telegram.WebApp.close()">CLOSE</button>
    <script>
        window.Telegram.WebApp.expand();
        setInterval(() => { document.getElementById('h').innerText = (115.4 + (Math.random()*0.4-0.2)).toFixed(1); }, 3000);
        let s = 0; setInterval(() => { s++; let m = Math.floor(s/60); let sec = s%60; document.getElementById('up').innerText = `UP: 00:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }, 1000);
    </script>
</body>
</html>
