<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>L0 CORE - ETHER EXTRACTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00f2ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-shadow: 0 0 10px #00f2ff;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui-container {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        .core-circle {
            width: 200px;
            height: 200px;
            border: 2px solid #00f2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 30px #00f2ff66;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s;
            background: rgba(0, 242, 255, 0.05);
        }

        .core-circle:active {
            transform: scale(0.95);
        }

        .status-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00f2ff;
            padding: 15px;
            margin-top: 10px;
            width: 280px;
        }

        .overunity-tag {
            color: #ff00ea;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .bar-container {
            width: 100%;
            height: 5px;
            background: #111;
            margin-top: 10px;
        }

        #progress {
            height: 100%;
            width: 30%;
            background: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-container">
        <div class="overunity-tag">ETHER EXTRACTION ACTIVE [OVERUNITY > 100%]</div>
        <div class="core-circle" id="coreTrigger">
            <div id="corePower">1.21 GW</div>
        </div>
        <div class="status-box">
            <div>SYSTEM: <span id="statusText">STABLE</span></div>
            <div>SOURCE: QUANTUM VACUUM</div>
            <div class="bar-container"><div id="progress"></div></div>
            <div style="margin-top: 10px; font-size: 10px; opacity: 0.7;">NO INPUT ENERGY REQUIRED</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const coreTrigger = document.getElementById('coreTrigger');
        const powerDisplay = document.getElementById('corePower');
        
        let power = 1.21;
        let particles = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                // Частицы стремятся к центру (сбор энергии из воздуха)
                this.speedX = (canvas.width/2 - this.x) * 0.01;
                this.speedY = (canvas.height/2 - this.y) * 0.01;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (Math.abs(this.x - canvas.width/2) < 10) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        coreTrigger.addEventListener('click', () => {
            power += 0.05;
            powerDisplay.innerText = power.toFixed(2) + " GW";
            // Эффект вспышки при захвате энергии
            ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.fillRect(0,0, canvas.width, canvas.height);
        });

        init();
        animate();
        Telegram.WebApp.ready();
    </script>
</body>
</html>
