<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #bc13fe; font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .scanner-line { position: absolute; top: 0; width: 100%; height: 2px; background: rgba(0, 212, 255, 0.5); box-shadow: 0 0 15px #00d4ff; animation: scan 3s linear infinite; z-index: 1; }
        .core-wrap { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; z-index: 2; }
        .main-node { width: 180px; height: 180px; border-radius: 50%; border: 3px solid #bc13fe; background: radial-gradient(circle, #1a0033 0%, #000 80%); box-shadow: 0 0 50px #bc13fe; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: breathe 3s ease-in-out infinite; }
        .pulse-ring { position: absolute; width: 180px; height: 180px; border: 2px solid #00d4ff; border-radius: 50%; opacity: 0; animation: wave 3s infinite; }
        .stat-text { font-size: 10px; color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .power-val { font-size: 42px; font-weight: bold; color: #fff; text-shadow: 0 0 20px #bc13fe; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #bc13fe; } 50% { transform: scale(1.08); box-shadow: 0 0 70px #bc13fe; } }
        @keyframes wave { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(2.5); opacity: 0; } }
        .ready-btn { margin-top: 50px; padding: 15px 40px; border: 1px solid #bc13fe; background: transparent; color: #bc13fe; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; z-index: 3; }
    </style>
</head>
<body>
    <div class="scanner-line"></div>
    <div style="position: absolute; top: 30px; left: 30px; font-size: 10px; color: #00d4ff;">SYSTEM: SYNDICATE_L0<br>STATUS: OPERATIONAL</div>
    <div class="core-wrap">
        <div class="pulse-ring"></div>
        <div class="main-node">
            <div class="stat-text">Mining Power</div>
            <div class="power-val" id="dig">115.4</div>
            <div class="stat-text" style="margin-top:5px; font-size:8px;">Terahashes / Sec</div>
        </div>
    </div>
    <button class="ready-btn" onclick="tg.close()">Confirm Status</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        setInterval(() => { document.getElementById('dig').innerText = (115.4 + (Math.random()*0.6-0.3)).toFixed(1); }, 2000);
    </script>
</body>
</html>
